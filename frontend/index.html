<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DocAssist Java Agent</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="workspace">
        <nav class="page-nav" aria-label="Primary">
          <a href="/">Ask</a>
          <a href="/history">History</a>
        </nav>

        <section id="ingest-panel" class="toolbar" aria-labelledby="ingest-title">
          <div class="toolbar-copy">
            <h1 id="ingest-title">Ingest documentation</h1>
            <p>Build or refresh the local search index for one Java documentation version.</p>
          </div>
          <div class="toolbar-field">
            <label for="ingest-version">Java version</label>
            <select id="ingest-version"></select>
          </div>
          <div class="toolbar-field">
            <label>Embedding service</label>
            <p class="service-note">Ollama embeddings</p>
          </div>
          <button id="ingest" type="button">Ingest</button>
        </section>

        <form id="ask-form" class="ask-panel">
          <div class="ask-controls">
            <div class="toolbar-field">
              <label for="ask-version">Java version</label>
              <select id="ask-version"></select>
            </div>
            <div class="toolbar-field">
              <label for="chat-provider">Answer model</label>
              <select id="chat-provider"></select>
            </div>
          </div>
          <label for="query">Question</label>
          <textarea
            id="query"
            name="query"
            rows="4"
            placeholder="How do I create a custom annotation?"
            required
          ></textarea>
          <div class="button-row">
            <button type="submit">Ask</button>
            <button id="reset" class="secondary-button" type="button">Reset</button>
          </div>
        </form>

        <section class="progress-panel" aria-live="polite">
          <h2>Progress</h2>
          <div id="progress-stages"></div>
        </section>

        <section class="answer-panel" aria-live="polite">
          <h1>Answer</h1>
          <pre id="answer"></pre>
        </section>

        <section class="sources-panel">
          <h2>Sources</h2>
          <div id="sources"></div>
        </section>

        <section class="workspace-panel">
          <h2>Evidence Board</h2>
          <div id="task-workspace"></div>
        </section>
      </section>
    </main>
    <script src="/static/app.js"></script>
  </body>
</html>
